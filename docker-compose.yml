services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: mizuno-backend
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - TECHSHOT_DIECUT_MODE=fal
    restart: unless-stopped
    networks:
      - mizuno-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    container_name: mizuno-frontend
    ports:
      - "3009:80"
    environment:
      - BACKEND_HOST=backend
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - mizuno-network

networks:
  mizuno-network:
    driver: bridge
    name: mizuno-network
